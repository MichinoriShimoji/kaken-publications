<html lang="ja">
<head>
<meta charset="utf-8">
<title>科研 業績一覧</title>
<style>

h1 { color:#2c3e50; font-size:1.2rem; margin-bottom:12px; display:flex; align-items:center; gap:12px; }

.btn:hover { border-color:#3498db; color:#3498db; }
.btn-primary { background:#3498db; border-color:#3498db; color:#fff; }
.btn-primary:hover { background:#2980b9; }
.btn-danger { background:#e74c3c; border-color:#e74c3c; color:#fff; }
.btn-danger:hover { background:#c0392b; }
.btn-green { background:#27ae60; border-color:#27ae60; color:#fff; }
.btn-green:hover { background:#219a52; }
.count { font-size:.78rem; color:#888; margin-bottom:8px; }
table { width:100%; border-collapse:collapse; font-size:.78rem; background:#fff;

th { background:#34495e; color:#fff; padding:6px 8px; text-align:left;
     font-size:.7rem; position:sticky; top:0; z-index:2; }
td { padding:5px 8px; border-bottom:1px solid #eee; vertical-align:top; }
tr:hover { background:#f0f7ff; }
td.ed { cursor:text; }
td.ed:hover { background:#fffde7; outline:1px dashed #e8a948; }
td.ed:focus { background:#fff; outline:2px solid #3498db; }
.name { font-weight:600; white-space:nowrap; }
.cat { font-size:.7rem; padding:1px 5px; border-radius:3px; white-space:nowrap; }
.cat-journal { background:#e8f5e9; color:#2e7d32; }
.cat-chapter { background:#e3f2fd; color:#1565c0; }
.cat-talk { background:#fff3e0; color:#e65100; }
.cat-invite { background:#fce4ec; color:#c62828; }
.cat-other { background:#f3e5f5; color:#6a1b9a; }
.doi a { color:#3498db; text-decoration:none; font-size:.75rem; }
.doi a:hover { text-decoration:underline; }
.del-btn { font-size:.65rem; padding:2px 6px; border-radius:3px; border:1px solid #ddd;

.del-btn:hover { border-color:#e74c3c; color:#e74c3c; }
.badge { font-size:.65rem; padding:1px 5px; border-radius:3px; margin:0 1px; white-space:nowrap; }
.badge-peer { background:#e8f5e9; color:#2e7d32; border:1px solid #c8e6c9; }
.badge-invite { background:#fff3e0; color:#e65100; border:1px solid #ffe0b2; }
.badge-intl { background:#e3f2fd; color:#1565c0; border:1px solid #bbdefb; }
.badge-oa { background:#f3e5f5; color:#6a1b9a; border:1px solid #e1bee7; }
.doi-cell { font-size:.73rem; }
.doi-cell a { color:#3498db; text-decoration:none; }
.doi-cell a:hover { text-decoration:underline; }
.doi-missing { background:#fff8e1; border-left:3px solid #ffc107; padding:2px 6px; font-size:.7rem; color:#f57f17; }
.field-highlight { border:2px solid #ff9800 !important; background:#fff8e1 !important; }
.field-hint { font-size:.65rem; color:#999; margin-top:2px; }

<body>
<h1>科研 業績一覧 <span style="font-size:.7rem;color:#888;font-weight:normal">編集可能</span></h1>
<div class="toolbar">
  <div class="grp"><label>名前</label>
    <select id="f_person" onchange="render()">
      <option value="">（全員）</option>
    </select></div>
  <div class="grp"><label>カテゴリー</label>
    <select id="f_cat" onchange="render()">
      <option value="">（全て）</option>
    </select></div>
  <div class="grp"><label>出版年</label>
    <select id="f_year" onchange="render()">
      <option value="">（全て）</option>
    </select></div>
  <div style="flex:1"></div>
  <button class="btn btn-primary" onclick="openAdd()">+ 追加</button>
  <button class="btn btn-green" onclick="exportCSV()">CSV出力</button>
  <button class="btn" onclick="saveJSON()">JSON保存</button>
  <button class="btn" onclick="loadJSON()">JSON読込</button>
</div>
<div class="count" id="count"></div>
<table>
<thead><tr><th style="width:28px">#</th><th>名前</th><th>業績名</th><th>カテゴリー</th><th>年</th><th>詳細</th><th>DOI/ISBN/ISSN</th><th>査読</th><th>招待</th><th>備考</th><th style="width:30px"></th></tr></thead>
<tbody id="tbody"></tbody>
</table>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="modal">
<div class="modal">
  <h2 id="modal-title">業績を追加</h2>
  <div class="field"><label>名前</label><input id="m_name"></div>
  <div class="field"><label>業績名</label><input id="m_title"></div>
  <div class="field"><label>業績カテゴリー</label>
    <select id="m_cat"></select></div>
  <div class="field"><label>出版年</label><input id="m_year" type="number" min="2000" max="2030"></div>
  <div class="field"><label>詳細情報</label><input id="m_detail"></div>
  <div class="field"><label>DOI/ISBN/ISSN</label><input id="m_doi" class="field-highlight" placeholder="10.xxxx/... or 978-... — 必ず記入してください"><div class="field-hint">科研費報告に必須。DOI (10.xxxx/...)、ISBN (978-...)、ISSN (xxxx-xxxx) のいずれか</div></div>
  <div style="display:flex;gap:10px">
    <div class="field" style="flex:1"><label>査読</label>
      <select id="m_peer"><option value="">なし</option><option value="1">あり</option></select></div>
    <div class="field" style="flex:1"><label>招待</label>
      <select id="m_invited"><option value="">なし</option><option value="1">あり</option></select></div>
    <div class="field" style="flex:1"><label>国際</label>
      <select id="m_intl"><option value="">なし</option><option value="1">あり</option></select></div>
    <div class="field" style="flex:1"><label>OA</label>
      <select id="m_oa"><option value="">なし</option><option value="1">あり</option></select></div>
  </div>
  <div class="field"><label>備考</label><input id="m_note"></div>
  <div class="modal-btns">
    <button class="btn" onclick="closeModal()">キャンセル</button>
    <button class="btn btn-primary" id="m_save" onclick="saveModal()">保存</button>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>

let editIdx = -1;

function detectPerson(name) {
  for (const [k,v] of Object.entries(NAME_MAP)) {
    if (name.includes(k)) return v;
  }
  return '(その他)';
}

function catClass(c) {
  if (c.includes('雑誌')) return 'cat-journal';
  if (c.includes('章') || c.includes('書籍')) return 'cat-chapter';
  if (c.includes('招待')) return 'cat-invite';
  if (c.includes('発表') || c.includes('研究会')) return 'cat-talk';
  return 'cat-other';
}

function initFilters() {
  const fp = document.getElementById('f_person');
  PERSONS.forEach(p => { const o=document.createElement('option'); o.value=p; o.textContent=p; fp.appendChild(o); });
  const fc = document.getElementById('f_cat');
  CATS.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; fc.appendChild(o); });
  const fy = document.getElementById('f_year');
  YEARS.forEach(y => { const o=document.createElement('option'); o.value=y; o.textContent=y; fy.appendChild(o); });
  // modal cat select
  const mc = document.getElementById('m_cat');
  CATS.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; mc.appendChild(o); });
}

function render() {
  const fp = document.getElementById('f_person').value;
  const fc = document.getElementById('f_cat').value;
  const fy = document.getElementById('f_year').value;
  const tbody = document.getElementById('tbody');
  let html = '', n = 0;
  DATA.forEach((d, i) => {
    if (fp && d.person !== fp) return;
    if (fc && d.category !== fc) return;
    if (fy && d.year !== fy) return;
    n++;
    const doiRaw = d.doi || '';
    const doiHtml = doiRaw ? (doiRaw.startsWith('http') ? `<a href="${doiRaw}" target="_blank">${doiRaw}</a>` : doiRaw.startsWith('10.') ? `<a href="https://doi.org/${doiRaw}" target="_blank">${doiRaw}</a>` : doiRaw) : '<span class="doi-missing">未入力</span>';
    const badges = [];
    if (d.peer_review === '1') badges.push('<span class="badge badge-peer">査読</span>');
    if (d.invited === '1') badges.push('<span class="badge badge-invite">招待</span>');
    if (d.intl === '1') badges.push('<span class="badge badge-intl">国際</span>');
    if (d.oa === '1') badges.push('<span class="badge badge-oa">OA</span>');
    const peerSel = `<select onchange="upd2(${i},'peer_review',this.value);render()" style="font-size:.7rem;padding:1px 2px"><option value=""${d.peer_review!=='1'?' selected':''}>-</option><option value="1"${d.peer_review==='1'?' selected':''}>有</option></select>`;
    const invSel = `<select onchange="upd2(${i},'invited',this.value);render()" style="font-size:.7rem;padding:1px 2px"><option value=""${d.invited!=='1'?' selected':''}>-</option><option value="1"${d.invited==='1'?' selected':''}>有</option></select>`;
    html += `<tr ondblclick="openEdit(${i})">
      <td style="color:#aaa">${n}</td>
      <td class="name ed" contenteditable onblur="upd(${i},'name',this)">${esc(d.name)}</td>
      <td class="ed" contenteditable onblur="upd(${i},'title',this)">${esc(d.title)}</td>
      <td><span class="cat ${catClass(d.category)}">${esc(d.category)}</span></td>
      <td class="ed" contenteditable onblur="upd(${i},'year',this)">${d.year}</td>
      <td class="ed" contenteditable onblur="upd(${i},'detail',this)" style="max-width:220px">${esc(d.detail)}</td>
      <td class="doi-cell ed" contenteditable onblur="upd(${i},'doi',this)">${doiHtml}</td>
      <td>${peerSel}</td>
      <td>${invSel}</td>
      <td class="ed" contenteditable onblur="upd(${i},'note',this)" style="max-width:120px">${badges.join('')} ${esc(d.note)}</td>
      <td><button class="del-btn" onclick="delRow(${i})">✕</button></td>
    </tr>`;
  });
  tbody.innerHTML = html;
  document.getElementById('count').textContent = `${n} / ${DATA.length} 件（セルをクリックで直接編集、ダブルクリックでモーダル編集）`;
}

function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function upd(i, key, el) {
  const v = el.textContent.trim();
  DATA[i][key] = v;
  if (key === 'name') DATA[i].person = detectPerson(v);
  toast('保存しました');
}
function upd2(i, key, val) {
  DATA[i][key] = val;
  toast('保存しました');
}

function delRow(i) {
  if (!confirm(`「${DATA[i].title}」を削除しますか？`)) return;
  DATA.splice(i, 1);
  render();
  toast('削除しました');
}

function openAdd() {
  editIdx = -1;
  document.getElementById('modal-title').textContent = '業績を追加';
  document.getElementById('m_name').value = '';
  document.getElementById('m_title').value = '';
  document.getElementById('m_cat').value = CATS[0] || '';
  document.getElementById('m_year').value = new Date().getFullYear();
  document.getElementById('m_detail').value = '';
  document.getElementById('m_doi').value = '';
  document.getElementById('m_peer').value = '';
  document.getElementById('m_invited').value = '';
  document.getElementById('m_intl').value = '';
  document.getElementById('m_oa').value = '';
  document.getElementById('m_note').value = '';
  document.getElementById('modal').classList.add('show');
}

function openEdit(i) {
  editIdx = i;
  const d = DATA[i];
  document.getElementById('modal-title').textContent = '業績を編集';
  document.getElementById('m_name').value = d.name;
  document.getElementById('m_title').value = d.title;
  document.getElementById('m_cat').value = d.category;
  document.getElementById('m_year').value = d.year;
  document.getElementById('m_detail').value = d.detail;
  document.getElementById('m_doi').value = d.doi;
  document.getElementById('m_peer').value = d.peer_review || '';
  document.getElementById('m_invited').value = d.invited || '';
  document.getElementById('m_intl').value = d.intl || '';
  document.getElementById('m_oa').value = d.oa || '';
  document.getElementById('m_note').value = d.note;
  document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function saveModal() {
  const obj = {
    name: document.getElementById('m_name').value,
    person: detectPerson(document.getElementById('m_name').value),
    title: document.getElementById('m_title').value,
    category: document.getElementById('m_cat').value,
    year: document.getElementById('m_year').value,
    detail: document.getElementById('m_detail').value,
    doi: document.getElementById('m_doi').value,
    peer_review: document.getElementById('m_peer').value,
    invited: document.getElementById('m_invited').value,
    intl: document.getElementById('m_intl').value,
    oa: document.getElementById('m_oa').value,
    note: document.getElementById('m_note').value,
  };
  if (editIdx >= 0) { DATA[editIdx] = obj; toast('更新しました'); }
  else { DATA.push(obj); toast('追加しました'); }
  closeModal();
  render();
}

function exportCSV() {
  const header = ['名前','業績名','業績カテゴリー','出版/公開年','詳細情報','doi/ISBN/ISSN','査読','招待','国際','OA','備考'];
  const bom = '\uFEFF';
  let csv = bom + header.join(',') + '\n';
  DATA.forEach(d => {
    csv += [d.name, d.title, d.category, d.year, d.detail, d.doi,
            d.peer_review==='1'?'あり':'', d.invited==='1'?'あり':'',
            d.intl==='1'?'あり':'', d.oa==='1'?'あり':'', d.note]
      .map(v => `"${(v||'').replace(/"/g,'""')}"`)
      .join(',') + '\n';
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kaken_publications.csv';
  a.click();
  toast('CSV出力しました');
}

function saveJSON() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kaken_publications.json';
  a.click();
  toast('JSON保存しました');
}

function loadJSON() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        DATA = JSON.parse(ev.target.result);
        render();
        toast(`${DATA.length}件 読み込みました`);
      } catch(err) { alert('JSONエラー: ' + err.message); }
    };
    r.readAsText(f);
  };
  inp.click();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// Migrate: extract peer_review/invited/intl/oa from note field
DATA.forEach(d => {
  if (!d.peer_review) d.peer_review = (d.note && d.note.includes('査読')) ? '1' : '';
  if (!d.invited) d.invited = (d.note && d.note.includes('招待')) ? '1' : '';
  if (!d.intl) d.intl = (d.note && (d.note.includes('国際') || d.note.includes('international'))) ? '1' : '';
  if (!d.oa) d.oa = (d.note && d.note.includes('OA')) ? '1' : '';
});
initFilters();
render();
</script>
